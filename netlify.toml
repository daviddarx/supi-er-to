[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # NEXTAUTH_URL is the public site URL — not a secret.
  # next-auth intentionally includes it in the client bundle for redirects.
  SECRETS_SCAN_OMIT_KEYS = "NEXTAUTH_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["node_modules/sharp/**"]

[functions."upload-image"]
  timeout = 26

# ─── Gallery deep-link rewrites ────────────────────────────────────────────────
# /[mode]/[imageId] deep links are SPA routes — the static mode page is served
# and the client reads window.location.pathname to open the carousel.
# These rules also exist in public/_redirects; netlify.toml is the authoritative
# fallback when @netlify/plugin-nextjs generates its own redirect rules.
[[redirects]]
  from = "/classic/*"
  to = "/classic"
  status = 200

[[redirects]]
  from = "/grid/*"
  to = "/grid"
  status = 200

[[redirects]]
  from = "/explorative/*"
  to = "/explorative"
  status = 200

[[redirects]]
  from = "/experimental/*"
  to = "/experimental"
  status = 200

